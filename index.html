                { "name": "16發 秋之韻 (扇型)", "price": "NT$ 2,500", "image": "https://img3.shop2000.com.tw/33679/p20/57441703-1.jpg" },
                { "name": "10發 冠中冠", "price": "NT$ 1,800", "image": "https://img3.shop2000.com.tw/33679/p17/41963852-1.jpg" },
                { "name": "12發 大無敵 (扇形)", "price": "NT$ 2,000", "image": "https://img3.shop2000.com.tw/33679/p18/45437187-1.jpg" },
                { "name": "12發 狼叫12", "price": "NT$ 1,900", "image": "https://img3.shop2000.com.tw/33679/p17/41928870-1.jpg" },
                { "name": "20發 歡樂頌 (扇型)", "price": "NT$ 2,800", "image": "https://img3.shop2000.com.tw/33679/p16/38717066-1.jpg" },
                { "name": "25發 五彩繽紛 (扇型)", "price": "NT$ 3,200", "image": "https://img3.shop2000.com.tw/33679/p18/45134233-1.jpg" }
            ],
            "熱銷主打設備": [
                { "name": "加長型噴燈 80公分 (含運)", "price": "NT$ 450", "image": "https://img3.shop2000.com.tw/33679/p14/22997543-1.jpg" },
                { "name": "一對12 無線遙控燃放設備", "price": "NT$ 3,500", "image": "https://img3.shop2000.com.tw/33679/p16/38403098-1.jpg" },
                { "name": "葫蘆小高空2花 50支/箱", "price": "NT$ 1,500", "image": "https://img3.shop2000.com.tw/33679/p17/41608854-1.jpg" }
            ]
        };

        const categoryContainer = document.getElementById('category-container');
        const productGrid = document.getElementById('product-grid');
        const titleElement = document.getElementById('current-category-title');
        const countElement = document.getElementById('product-count');

        function init() {
            renderCategories();
            renderProducts('全部商品'); 
        }

        function renderCategories() {
            let html = `<button onclick="renderProducts('全部商品')" class="category-btn active px-5 py-2 rounded-lg border border-gray-200 bg-white text-gray-700 font-bold text-sm whitespace-nowrap hover:border-red-500" data-cat="全部商品">全部商品</button>`;
            
            Object.keys(database).forEach(category => {
                if(database[category].length > 0) {
                    html += `<button onclick="renderProducts('${category}')" class="category-btn px-5 py-2 rounded-lg border border-gray-200 bg-white text-gray-700 font-bold text-sm whitespace-nowrap hover:border-red-500" data-cat="${category}">${category}</button>`;
                }
            });
            categoryContainer.innerHTML = html;
        }

        function renderProducts(categoryName, searchQuery = "") {
            // 更新按鈕狀態
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('data-cat') === categoryName) btn.classList.add('active');
            });

            titleElement.innerText = categoryName;
            let productsToRender = [];

            // 取出資料
            if (categoryName === '全部商品') {
                Object.values(database).forEach(arr => productsToRender.push(...arr));
            } else {
                productsToRender = database[categoryName] || [];
            }

            // 🛡️ 過濾器：防止任何 Shop2000 雜訊圖示出現
            productsToRender = productsToRender.filter(item => {
                const img = item.image.toLowerCase();
                return !img.includes('.gif') && !img.includes('sys/') && !item.name.includes('HOME');
            });

            // 移除重複商品
            productsToRender = [...new Map(productsToRender.map(item => [item.image, item])).values()];

            // 搜尋功能
            if (searchQuery) {
                productsToRender = productsToRender.filter(p => p.name.includes(searchQuery));
                titleElement.innerText = `搜尋結果: ${searchQuery}`;
            }

            countElement.innerText = `共 ${productsToRender.length} 件武裝`;
            productGrid.innerHTML = '';

            if (productsToRender.length === 0) {
                productGrid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 bg-white rounded-xl border border-gray-100 shadow-sm">查無相關彈藥資料。</div>`;
                return;
            }

            // 渲染商品卡片 (霸氣直球版)
            productsToRender.forEach((item, index) => {
                // 自動清除系統贅字
                const cleanName = item.name.replace('已放入購物車', '').trim();
                const displayPrice = item.price ? item.price : "特價優惠中"; 
                const delay = index * 30; // 產生順滑的瀑布流載入感

                const cardHTML = `
                    <div class="bg-white rounded-xl overflow-hidden product-card border border-gray-100 flex flex-col shadow-sm opacity-0 animate-fade-in-up" style="animation-delay: ${delay}ms;">
                        <div class="h-44 sm:h-56 bg-gray-100 relative group cursor-pointer overflow-hidden flex items-center justify-center">
                            <img src="${item.image}" alt="${cleanName}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="text-sm sm:text-base font-bold text-gray-900 mb-2 line-clamp-2 leading-snug">${cleanName}</h3>
                            <div class="mt-auto pt-3 border-t border-gray-100">
                                <div class="flex items-end justify-between mb-3">
                                    <span class="text-xs text-gray-400 font-medium line-through hidden sm:block">原價市調</span>
                                    <span class="text-xl sm:text-2xl text-red-600 font-black tracking-tight">${displayPrice}</span>
                                </div>
                                <button onclick="addToCart(this)" class="w-full bg-gray-900 hover:bg-red-600 text-white py-2.5 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 active:scale-95">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                    加入購物車
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                productGrid.innerHTML += cardHTML;
            });
        }

        // 購物車動態回饋
        function addToCart(btnElement) {
            const cartElement = document.getElementById('cartCount');
            cartElement.innerText = parseInt(cartElement.innerText) + 1;
            
            // 購物車按鈕跳動特效
            const cartBtn = cartElement.parentElement;
            cartBtn.classList.add('scale-110', 'bg-red-600');
            cartBtn.classList.remove('bg-gray-900');
            
            // 被點擊的按鈕變色特效
            const originalText = btnElement.innerHTML;
            btnElement.innerHTML = "✓ 已加入";
            btnElement.classList.add('bg-green-600');
            btnElement.classList.remove('bg-gray-900', 'hover:bg-red-600');

            setTimeout(() => {
                cartBtn.classList.remove('scale-110', 'bg-red-600');
                cartBtn.classList.add('bg-gray-900');
                
                btnElement.innerHTML = originalText;
                btnElement.classList.remove('bg-green-600');
                btnElement.classList.add('bg-gray-900', 'hover:bg-red-600');
            }, 800);
        }

        // 搜尋監聽
        const handleSearch = (e) => {
            const query = e.target.value.trim();
            renderProducts('全部商品', query);
            if(e.target.id === 'searchInput') document.getElementById('searchInputMobile').value = query;
            if(e.target.id === 'searchInputMobile') document.getElementById('searchInput').value = query;
        };

        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('searchInputMobile').addEventListener('input', handleSearch);

        // 系統啟動
        init();
    </script>
