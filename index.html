<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>168煙火團隊 | 專業科技下單平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neon-text { text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055, 0 0 30px #ff0055; }
        .neon-border { box-shadow: 0 0 15px rgba(255, 0, 85, 0.5); }
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tech-card { transition: all 0.3s ease; }
        .tech-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
            border-color: rgba(255, 0, 85, 0.5);
        }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans antialiased min-h-screen flex flex-col">

    <nav class="glass-panel fixed w-full z-50 top-0 border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-20">
            <span class="text-3xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 neon-text">168 FIREWORKS</span>
            <button class="bg-gradient-to-r from-pink-600 to-purple-600 text-white px-6 py-2 rounded-full font-bold neon-border">
                🛒 購物車 (0)
            </button>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-20 bg-gray-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="text-4xl font-black mb-12 text-white border-l-4 border-pink-500 pl-4">熱銷彈藥庫 <span class="text-sm text-gray-500 tracking-widest ml-2">HOT WEAPONS</span></h2>
            
            <div id="product-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="col-span-full text-center text-pink-500 font-mono tracking-widest animate-pulse">
                    正在從 168 資料庫同步武器清單...
                </div>
            </div>
        </div>
    </main>

    <footer class="glass-panel py-8 mt-auto border-t border-gray-800/50">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-400 text-sm">聯絡電話：0915-830-652 李先生 | LINE ID: @142guzth</p>
        </div>
    </footer>

    <script>
        // 這是你剛剛從 Termux 抓下來的真實資料庫 (我已經幫你整理好格式)
        const database = [
            {
                "product_name": "一對12無線遙控燃放設備 齊上彩煙設備",
                "image_url": "https://img3.shop2000.com.tw/33679/p16/38403098-1.jpg"
            },
            {
                "product_name": "煙火-加長型噴燈 3支 含運費 (不含瓦斯罐)",
                "image_url": "https://img3.shop2000.com.tw/33679/p14/22997543-1.jpg"
            },
            {
                "product_name": "煙火-加長型噴燈 1支 含運費 (不含瓦斯罐)",
                "image_url": "https://img3.shop2000.com.tw/33679/p8/11680101-1.jpg"
            },
            {
                "product_name": "20發 金紅",
                "image_url": "https://img3.shop2000.com.tw/33679/p18/45295507-1.jpg"
            },
            {
                "product_name": "葫蘆小高空2花 50支/箱",
                "image_url": "https://img3.shop2000.com.tw/33679/p17/41608854-1.jpg"
            }
        ];

        // 渲染畫面
        const container = document.getElementById('product-container');
        container.innerHTML = ''; // 清除載入動畫

        database.forEach(item => {
            // 自動過濾掉舊網站爬蟲帶來的 "已放入購物車" 贅字
            const cleanName = item.product_name.replace('已放入購物車', '').trim();
            
            // 建立卡片 HTML
            const cardHTML = `
                <div class="glass-panel rounded-xl overflow-hidden tech-card relative flex flex-col">
                    <div class="h-48 bg-gray-800 relative">
                        <img src="${item.image_url}" alt="${cleanName}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <h3 class="text-lg font-bold text-white mb-2 line-clamp-2 leading-tight">${cleanName}</h3>
                        <div class="mt-auto flex justify-between items-end pt-4">
                            <span class="text-lg font-black text-pink-400">專屬報價</span>
                            <button class="bg-gray-800 hover:bg-pink-600 px-4 py-2 rounded text-sm font-bold transition-colors">加入購物車</button>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    </script>
</body>
</html>
