<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>168煙火團隊 | 全台最大煙火批發零售中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏捲軸但保留滾動功能 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .category-btn { transition: all 0.3s ease; }
        .category-btn.active {
            background-color: #dc2626; /* 專業大氣的煙火紅 */
            color: white;
            border-color: #dc2626;
            box-shadow: 0 4px 6px -1px rgba(220, 38, 38, 0.4);
        }
        
        .product-card { transition: all 0.3s ease; }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col selection:bg-red-500 selection:text-white">

    <nav class="bg-white fixed w-full z-50 top-0 border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-600 rounded-lg flex items-center justify-center text-white font-black text-xl shadow-md">
                        168
                    </div>
                    <span class="text-2xl font-black tracking-wider text-gray-900">煙火團隊<span class="text-sm font-normal text-gray-500 ml-2 hidden sm:inline">批發 · 零售 · 活動承辦</span></span>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="relative hidden md:block">
                        <input type="text" id="searchInput" placeholder="搜尋煙火名稱..." class="bg-gray-100 border border-gray-200 text-gray-800 rounded-full py-2 px-4 pl-10 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 focus:bg-white w-64 transition-all">
                        <svg class="w-4 h-4 text-gray-500 absolute left-4 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    
                    <button class="text-gray-600 hover:text-red-600 font-bold text-sm px-3 py-2 transition-colors hidden sm:block">
                        會員登入
                    </button>
                    
                    <button class="bg-gray-900 hover:bg-gray-800 text-white px-5 py-2.5 rounded-full font-bold shadow-md transition-all flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span class="hidden sm:inline">詢價車</span>
                        <span id="cartCount" class="bg-red-600 text-white px-2 rounded-full text-xs py-0.5">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="bg-red-50 border-b border-red-100 pt-20">
        <div class="max-w-7xl mx-auto px-4 py-3 sm:px-6 lg:px-8 text-sm text-red-800 flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"></path></svg>
            <span class="font-bold">最新公告：</span> 由於業務繁忙，面交請務必提早預約！客服 LINE: @142guzth
        </div>
    </div>

    <main class="flex-grow py-8 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
        
        <div class="mb-8 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <h2 class="text-sm font-bold mb-3 text-gray-500 tracking-widest uppercase">商品目錄</h2>
            <div id="category-container" class="flex gap-2 overflow-x-auto pb-2">
                </div>
        </div>

        <div class="flex items-end justify-between mb-6">
            <h2 id="current-category-title" class="text-3xl font-black text-gray-900 border-l-4 border-red-600 pl-4">全部商品</h2>
            <span id="product-count" class="text-gray-500 text-sm font-medium">載入中...</span>
        </div>
        
        <div class="md:hidden mb-6 relative">
            <input type="text" id="searchInputMobile" placeholder="搜尋煙火名稱..." class="bg-white border border-gray-300 rounded-lg py-3 px-4 pl-10 text-sm focus:outline-none focus:border-red-500 w-full text-gray-800 shadow-sm">
            <svg class="w-5 h-5 text-gray-400 absolute left-4 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
            </div>
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto py-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <p class="text-gray-900 font-black text-xl mb-1">168煙火團隊</p>
                <p class="text-gray-500 text-sm">合法煙火販售 / 專業大型活動施放</p>
            </div>
            <div class="text-right">
                <p class="text-gray-700 font-bold text-lg">0915-830-652 李先生</p>
                <p class="text-gray-500 text-sm">LINE ID: @142guzth (請直接通話)</p>
            </div>
        </div>
    </footer>

    <script>
        // 這裡放我們先前在 V2 抓到的真實煙火資料 (作為展示)
        // 等你從電腦後台把 Excel 抓下來，我們隨時可以替換成最完整的版本！
        const database = {
            "小盒裝煙火": [
                { "name": "12發 玄武", "image": "https://img3.shop2000.com.tw/33679/p20/58299649-1.jpg" },
                { "name": "12發 繁花", "image": "https://img3.shop2000.com.tw/33679/p20/57441456-1.jpg" },
                { "name": "20發 幸福", "image": "https://img3.shop2000.com.tw/33679/p19/56743928-1.jpg" },
                { "name": "12發 大富", "image": "https://img3.shop2000.com.tw/33679/p19/54382583-1.jpg" },
                { "name": "9發 大發", "image": "https://img3.shop2000.com.tw/33679/p19/54382569-1.jpg" }
            ],
            "中盒裝煙火": [
                { "name": "26發 一代佳人", "image": "https://img3.shop2000.com.tw/33679/p20/57442520-2.jpg" },
                { "name": "20發 彩燕紛飛(炸游星)", "image": "https://img3.shop2000.com.tw/33679/p20/57442456-1.jpg" },
                { "name": "15發 520", "image": "https://img3.shop2000.com.tw/33679/p15/36015986-1.jpg" }
            ],
            "大盒裝煙火": [
                { "name": "16發 王者榮耀", "image": "https://img3.shop2000.com.tw/33679/p20/57455838-1.jpg" },
                { "name": "30發銀柳", "image": "https://img3.shop2000.com.tw/33679/p20/57454419-3.jpg" },
                { "name": "28發五花八門", "image": "https://img3.shop2000.com.tw/33679/p20/57454410-1.jpg" }
            ],
            "熱銷主打": [
                { "name": "加長型噴燈 3支", "image": "https://img3.shop2000.com.tw/33679/p14/22997543-1.jpg" },
                { "name": "一對12 無線遙控燃放設備", "image": "https://img3.shop2000.com.tw/33679/p16/38403098-1.jpg" }
            ]
        };

        const categoryContainer = document.getElementById('category-container');
        const productGrid = document.getElementById('product-grid');
        const titleElement = document.getElementById('current-category-title');
        const countElement = document.getElementById('product-count');

        function init() {
            renderCategories();
            renderProducts('全部商品'); 
        }

        function renderCategories() {
            let html = `<button onclick="renderProducts('全部商品')" class="category-btn active px-5 py-2 rounded-lg border border-gray-200 bg-white text-gray-700 font-bold text-sm whitespace-nowrap hover:border-red-500" data-cat="全部商品">全部商品</button>`;
            
            Object.keys(database).forEach(category => {
                if(database[category].length > 0) {
                    html += `<button onclick="renderProducts('${category}')" class="category-btn px-5 py-2 rounded-lg border border-gray-200 bg-white text-gray-700 font-bold text-sm whitespace-nowrap hover:border-red-500" data-cat="${category}">${category}</button>`;
                }
            });
            categoryContainer.innerHTML = html;
        }

        function renderProducts(categoryName, searchQuery = "") {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.getAttribute('data-cat') === categoryName) btn.classList.add('active');
            });

            titleElement.innerText = categoryName;
            let productsToRender = [];

            if (categoryName === '全部商品') {
                Object.values(database).forEach(arr => productsToRender.push(...arr));
            } else {
                productsToRender = database[categoryName] || [];
            }

            // 🛡️ 強力殺蟲劑：確保沒有 Shop2000 的系統 GIF 圖混進來
            productsToRender = productsToRender.filter(item => {
                const img = item.image.toLowerCase();
                return !img.includes('.gif') && !img.includes('sys/');
            });

            // 移除重複
            productsToRender = [...new Map(productsToRender.map(item => [item.image, item])).values()];

            if (searchQuery) {
                productsToRender = productsToRender.filter(p => p.name.includes(searchQuery));
                titleElement.innerText = `搜尋結果: ${searchQuery}`;
            }

            countElement.innerText = `共 ${productsToRender.length} 件商品`;
            productGrid.innerHTML = '';

            if (productsToRender.length === 0) {
                productGrid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500 bg-white rounded-xl border border-gray-100">查無相關商品。</div>`;
                return;
            }

            // 產生白晝版專業卡片
            productsToRender.forEach(item => {
                const cleanName = item.name.replace('已放入購物車', '').trim();
                const cardHTML = `
                    <div class="bg-white rounded-xl overflow-hidden product-card border border-gray-100 flex flex-col">
                        <div class="h-40 sm:h-52 bg-gray-100 relative group cursor-pointer overflow-hidden">
                            <img src="${item.image}" alt="${cleanName}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="text-sm sm:text-base font-bold text-gray-900 mb-2 line-clamp-2 leading-snug">${cleanName}</h3>
                            <div class="mt-auto pt-3 border-t border-gray-100">
                                <p class="text-xs text-red-600 font-bold mb-2 flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                                    登入查看大盤批發價
                                </p>
                                <button onclick="addToCart()" class="w-full bg-gray-900 hover:bg-red-600 text-white py-2 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-2">
                                    加入詢價
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                productGrid.innerHTML += cardHTML;
            });
        }

        function addToCart() {
            const cartElement = document.getElementById('cartCount');
            cartElement.innerText = parseInt(cartElement.innerText) + 1;
            // 簡單的點擊動畫
            cartElement.parentElement.classList.add('scale-105', 'bg-red-600');
            cartElement.parentElement.classList.remove('bg-gray-900');
            setTimeout(() => {
                cartElement.parentElement.classList.remove('scale-105', 'bg-red-600');
                cartElement.parentElement.classList.add('bg-gray-900');
            }, 200);
        }

        // 搜尋監聽
        const handleSearch = (e) => {
            const query = e.target.value.trim();
            renderProducts('全部商品', query);
            if(e.target.id === 'searchInput') document.getElementById('searchInputMobile').value = query;
            if(e.target.id === 'searchInputMobile') document.getElementById('searchInput').value = query;
        };

        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('searchInputMobile').addEventListener('input', handleSearch);

        init();
    </script>
</body>
</html>
